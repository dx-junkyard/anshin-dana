version: "3.9"
services:
  reverse-proxy:
    image: nginx:1.27
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api

  web:
    build: ./web
    environment:
      - NEXT_PUBLIC_LIFF_ID=${LIFF_ID}
      - NEXT_PUBLIC_API_BASE=/api
      - TZ=Asia/Tokyo
    depends_on:
      - api

  api:
    build: ./api
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - TZ=Asia/Tokyo
      - DATABASE_URL=jdbc:postgresql://db:5432/anshindana
      - DATABASE_USER=app
      - DATABASE_PASSWORD=app
      - APP_JWT_SECRET=${APP_JWT_SECRET}
      - APP_JWT_ISSUER=${APP_JWT_ISSUER}
      - APP_JWT_EXPIRES_MINUTES=${APP_JWT_EXPIRES_MINUTES}
      - LINE_CHANNEL_ID=${LINE_CHANNEL_ID}
      - LINE_CHANNEL_SECRET=${LINE_CHANNEL_SECRET}
      - LINE_MESSAGING_CHANNEL_ACCESS_TOKEN=${LINE_MESSAGING_CHANNEL_ACCESS_TOKEN}
    depends_on:
      - db

  worker:
    build: ./api
    command: ["java","-jar","app.jar","--spring.profiles.active=worker"]
    environment:
      - TZ=Asia/Tokyo
      - DATABASE_URL=jdbc:postgresql://db:5432/anshindana
      - DATABASE_USER=app
      - DATABASE_PASSWORD=app
      - APP_JWT_SECRET=${APP_JWT_SECRET}
      - APP_JWT_ISSUER=${APP_JWT_ISSUER}
      - APP_JWT_EXPIRES_MINUTES=${APP_JWT_EXPIRES_MINUTES}
      - LINE_CHANNEL_ID=${LINE_CHANNEL_ID}
      - LINE_CHANNEL_SECRET=${LINE_CHANNEL_SECRET}
      - LINE_MESSAGING_CHANNEL_ACCESS_TOKEN=${LINE_MESSAGING_CHANNEL_ACCESS_TOKEN}
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      - POSTGRES_DB=anshindana
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=app
      - TZ=Asia/Tokyo
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

volumes:
  db-data:
